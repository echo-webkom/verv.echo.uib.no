name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/verv

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verv
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🐢 Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Migrate database
        run: pnpm db:migrate

      - name: 🛫 Type check
        run: pnpm typecheck

      - name: 📝 Lint
        run: pnpm lint

      - name: 👷🏻‍♂️ Build
        run: pnpm build
        env:
          FEIDE_CLIENT_ID: ci-build
          FEIDE_CLIENT_SECRET: ci-build
          SKIP_ENV_VALIDATION: true
