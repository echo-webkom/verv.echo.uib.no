services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "host"
    environment:
      # Database - Don't use localhost as it refers to the container itself
      - DATABASE_URL=${DATABASE_URL:-http://127.0.0.1:8080}
      # Auth
      - FEIDE_CLIENT_ID=${FEIDE_CLIENT_ID}
      - FEIDE_CLIENT_SECRET=${FEIDE_CLIENT_SECRET}
      # Groups
      - GROUPS_API_URL=${GROUPS_API_URL:-http://127.0.0.1:3000/api/groups}
      # API
      - ADMIN_KEY=${ADMIN_KEY:-foobar}
      # AWS SES
      - AWS_REGION=${AWS_REGION:-eu-north-1}
      - AWS_SES_ACCESS_KEY_ID=${AWS_SES_ACCESS_KEY_ID}
      - AWS_SES_SECRET_ACCESS_KEY=${AWS_SES_SECRET_ACCESS_KEY}
    restart: unless-stopped
