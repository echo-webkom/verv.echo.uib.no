services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database - use host.docker.internal to connect to host machine
      - DATABASE_URL=${DATABASE_URL:-http://host.docker.internal:8080}
      # Auth
      - FEIDE_CLIENT_ID=${FEIDE_CLIENT_ID}
      - FEIDE_CLIENT_SECRET=${FEIDE_CLIENT_SECRET}
      # Groups
      - GROUPS_API_URL=${GROUPS_API_URL:-http://localhost:3000/api/groups}
      # API
      - ADMIN_KEY=${ADMIN_KEY:-foobar}
      # AWS SES
      - AWS_REGION=${AWS_REGION:-eu-north-1}
      - AWS_SES_ACCESS_KEY_ID=${AWS_SES_ACCESS_KEY_ID}
      - AWS_SES_SECRET_ACCESS_KEY=${AWS_SES_SECRET_ACCESS_KEY}
    restart: unless-stopped
