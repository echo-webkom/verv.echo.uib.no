services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database - connect to postgres service
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/verv}
      # Auth
      - FEIDE_CLIENT_ID=${FEIDE_CLIENT_ID}
      - FEIDE_CLIENT_SECRET=${FEIDE_CLIENT_SECRET}
      # Groups
      - GROUPS_API_URL=${GROUPS_API_URL:-http://localhost:3000/api/groups}
      # API
      - ADMIN_KEY=${ADMIN_KEY:-foobar}
      # AWS SES
      - AWS_REGION=${AWS_REGION:-eu-north-1}
      - AWS_SES_ACCESS_KEY_ID=${AWS_SES_ACCESS_KEY_ID}
      - AWS_SES_SECRET_ACCESS_KEY=${AWS_SES_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=verv
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
